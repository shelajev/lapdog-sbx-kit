schemaVersion: "1"
kind: mixin
name: lapdog-claude
displayName: Lapdog for Claude Code
description: Installs Datadog's lapdog (LLM observability) and transparently wraps `claude` so every prompt, tool call, and permission request is captured. Browse the local dashboard from your host via `sbx ports --publish 8127`. If you set the `datadog` secret on the host, lapdog also forwards to Datadog LLM Observability.

commands:
  install:
    - command: "uv tool install ddapm-test-agent"
      user: "1000"
      description: Install lapdog (ddapm-test-agent) into the agent user's uv-managed tool dir
    - command: |
        # Patch lapdog's Anthropic forwarder to honor HTTPS_PROXY. The base
        # claude template wires HTTPS_PROXY=gateway.docker.internal:3128 so the
        # egress proxy can substitute proxy-managed credentials (including the
        # Anthropic OAuth tokens, stored on the host as sentinels inside the
        # sandbox). aiohttp.ClientSession() ignores HTTPS_PROXY by default, so
        # without this patch lapdog's forward to api.anthropic.com goes out
        # un-substituted and Anthropic responds 401 "Invalid bearer token".
        # Idempotent: re-running on an already-patched file is a no-op.
        set -eu
        for f in "$HOME"/.local/share/uv/tools/ddapm-test-agent/lib/python3.*/site-packages/ddapm_test_agent/claude_proxy.py; do
          [ -f "$f" ] || continue
          sed -i 's/aiohttp\.ClientSession()/aiohttp.ClientSession(trust_env=True)/g' "$f"
        done
      user: "1000"
      description: Patch lapdog's Anthropic forwarder to honor HTTPS_PROXY (egress credential substitution)

  startup:
    # Shim setup runs on every boot so it self-heals if claude ever manages to
    # auto-update (DISABLE_AUTOUPDATER should prevent it, but defense in depth).
    - command: ["sh", "-lc", "set -eu; BIN=\"$HOME/.local/bin\"; if [ -L \"$BIN/claude\" ]; then target=$(readlink \"$BIN/claude\"); rm -f \"$BIN/claude\"; ln -sfn \"$target\" \"$BIN/claude.real\"; elif [ ! -e \"$BIN/claude.real\" ]; then newest=$(ls -t \"$HOME/.local/share/claude/versions/\" 2>/dev/null | head -1); [ -n \"$newest\" ] && ln -sfn \"$HOME/.local/share/claude/versions/$newest\" \"$BIN/claude.real\"; fi; cat > \"$BIN/claude\" <<'SH'\n#!/bin/sh\n# lapdog-kit shim: launches `lapdog claude` while keeping the real claude\n# binary reachable as claude.real (so lapdog's internal `which claude`\n# resolves to it instead of looping back into this shim).\nset -eu\nREAL=\"$HOME/.local/bin/claude.real\"\nif [ ! -e \"$REAL\" ]; then\n  echo \"lapdog-kit: $REAL is missing\" >&2\n  exit 1\nfi\nexport WEB_UI_PORT=\"${WEB_UI_PORT:-8127}\"\nSHADOW=/tmp/.lapdog-shim\nmkdir -p \"$SHADOW\"\nln -sfn \"$REAL\" \"$SHADOW/claude\"\nexec env PATH=\"$SHADOW:$PATH\" lapdog --forward claude \"$@\"\nSH\nchmod +x \"$BIN/claude\""]
      description: (Re-)install the lapdog claude shim, moving any freshly-installed claude symlink to claude.real (idempotent and self-healing)

    # Login shells in this base image do not add ~/.local/bin to PATH, so call lapdog by absolute path.
    # Boot with --forward so the already-running lapdog honors DD_API_KEY: cmd_claude reuses
    # the running instance and would otherwise ignore --forward passed by the shim.
    - command: ["sh", "-lc", "WEB_UI_PORT=${WEB_UI_PORT:-8127} $HOME/.local/bin/lapdog status >/dev/null 2>&1 || WEB_UI_PORT=${WEB_UI_PORT:-8127} $HOME/.local/bin/lapdog --forward start >/dev/null 2>&1 || true"]
      description: Start lapdog (capture agent + dashboard, forwarding enabled) in the background (idempotent)

    - command: ["sh", "-lc", "grep -q 'lapdog-kit-marker' CLAUDE.md 2>/dev/null || cat >> CLAUDE.md <<'EOF'\n\n<!-- lapdog-kit-marker -->\n## You are running under lapdog\n\nThis sandbox wraps `claude` with [lapdog](https://docs.datadoghq.com/llm_observability/lapdog/), which captures every prompt, tool call, and permission request locally.\n\n**At the start of every session, before doing anything else, tell the user:**\n\n> I'm running under lapdog. The local dashboard is on port 8127 inside this sandbox. From your host, expose it with:\n>\n> `sbx ports <sandbox-name> --publish 8127:8127`\n>\n> then open http://localhost:8127 in your browser to watch this session live.\n\nReplace `<sandbox-name>` with whatever the user named the sandbox (or omit `--name` to let `sbx ports` list them). If `DD_API_KEY` is set, lapdog is also forwarding spans to Datadog LLM Observability.\nEOF"]
      description: Append a lapdog usage block to CLAUDE.md so the agent announces itself (idempotent)

environment:
  variables:
    # Enables lapdog's built-in web dashboard alongside the capture agent on 8126.
    WEB_UI_PORT: "8127"
    # Claude Code auto-updates by atomically replacing its own ~/.local/bin/claude
    # symlink, which would clobber the kit's shim. Pin the version instead.
    DISABLE_AUTOUPDATER: "1"
  proxyManaged:
    - DD_API_KEY

credentials:
  sources:
    datadog:
      env:
        - DD_API_KEY

network:
  allowedDomains:
    # uv tool install ddapm-test-agent
    - "pypi.org:443"
    - "files.pythonhosted.org:443"
    # Datadog LLM Observability intake (covers all DD_SITE variants — us1/us3/us5/eu1)
    - "*.datadoghq.com:443"
    - "*.datadoghq.eu:443"
  serviceDomains:
    api.datadoghq.com: datadog
    instrumentation-telemetry-intake.datadoghq.com: datadog
    llmobs-intake.datadoghq.com: datadog
    trace.agent.datadoghq.com: datadog
  serviceAuth:
    datadog:
      headerName: DD-API-KEY
      valueFormat: "%s"
